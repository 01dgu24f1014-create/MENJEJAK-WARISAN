<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menjejak Warisan - Metaverse Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>

    body{
      font-family:'Press Start 2P', cursive;
      background:#050505;
      background-image: radial-gradient(circle,#1a1a2e 0%, #050505 80%);
      color:white;
      margin:0;
      padding:30px;
    }

    .header-title{
      text-align:center;
      font-size:26px;
      color:white;
      margin-bottom:10px;
      text-shadow:
      0 0 5px #fff,
      0 0 10px #ff00de,
      0 0 20px #ff00de,
      0 0 40px #ff00de;
    }

    .sub-title{
      text-align:center;
      color:#e0ffff;
      font-size:10px;
      margin-bottom:40px;
      text-shadow:0 0 5px #00ffff;
    }

    .map-container{
      padding:5px;
      border:3px solid #00ffff;
      border-radius:8px;
      box-shadow:
      0 0 15px #00ffff,
      inset 0 0 15px #00ffff;
      background:black;
      margin-bottom:30px;
    }

    #map{
      width:100%;
      height:550px;
      border-radius:5px;
    }

    .dialog-box{
      background:rgba(0,0,0,0.85);
      border:3px solid #39ff14;
      border-radius:10px;
      padding:25px;
      min-height:220px;
      box-shadow:
      0 0 15px #39ff14,
      inset 0 0 10px #39ff14;
    }

    .dialog-title{
      color:#39ff14;
      font-size:14px;
      margin-top:0;
      margin-bottom:20px;
      padding-bottom:10px;
      border-bottom:1px dashed #39ff14;
      text-shadow:0 0 5px #39ff14;
    }

    #dialog-text{
      font-size:11px;
      line-height:1.9;
      color:#e0ffff;
    }

    .source-text{
      display:block;
      margin-top:15px;
      padding-top:10px;
      border-top:1px dashed #555;
      color:#ffaa00;
      font-size:9px;
    }

    .metaverse-btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 15px;
      border:2px solid #ff00de;
      color:#ff00de;
      text-decoration:none;
      font-size:10px;
      box-shadow:
      0 0 10px #ff00de,
      inset 0 0 5px #ff00de;
      transition:0.3s;
    }

    .metaverse-btn:hover{
      background:#ff00de;
      color:white;
      box-shadow:0 0 20px #ff00de;
    }

  </style>
</head>

<body>

<h2 class="header-title">MENJEJAK WARISAN</h2>
<h3 class="sub-title">
  "WARISAN DIJEJAK, IDENTITI DIJAGA" // METAVERSE HUB
</h3>

<div class="map-container">
  <div id="map"></div>
</div>

<section class="dialog-box">

  <h3 class="dialog-title">TERMINAL DATA SEJARAH</h3>

  <div id="dialog-text">
    Sistem sedia...<br><br>
    Klik pin lokasi pada peta untuk mengakses maklumat sejarah lengkap.
  </div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  var map = L.map('map').setView([4.2105, 101.9758], 6);

  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
      attribution:'© OpenStreetMap & CartoDB'
    }
  ).addTo(map);

  // DATA TEMPAT BERSEJARAH
  var lokasiWarisan = [

    {
      n:"Muzium Kota Kayang (Perlis)",
      t:"1999",
      c:[6.4172,100.1706],
      i:"Muzium ini dibina di atas kawasan bekas istana Raja Perlis. Kawasan ini juga mempunyai penemuan arkeologi penting termasuk artifak Neolitik dan batu nisan purba yang membuktikan kewujudan penempatan awal di Perlis.",
      src:"Jabatan Muzium Malaysia"
    },

    {
      n:"Balai Besar (Kedah)",
      t:"1735",
      c:[6.1206,100.3664],
      i:"Balai Besar merupakan tempat rasmi adat istiadat Kesultanan Kedah termasuk pertabalan Sultan. Bangunan ini pernah dimusnahkan oleh tentera Bugis dan Siam sebelum dibina semula.",
      src:"Perbadanan Perpustakaan Awam Kedah"
    },

    {
      n:"Khoo Kongsi (Pulau Pinang)",
      t:"1906",
      c:[5.4141,100.3375],
      i:"Kompleks rumah kongsi masyarakat Cina yang terkenal dengan seni ukiran halus, patung naga, dan struktur tradisional dari China Selatan.",
      src:"Penang Heritage Trust"
    },

    {
      n:"Menara Condong Teluk Intan (Perak)",
      t:"1885",
      c:[4.0253,101.0195],
      i:"Menara ini asalnya dibina sebagai tangki simpanan air. Struktur tanah lembut menyebabkan bangunan ini condong dan menjadi ikon terkenal negeri Perak.",
      src:"Majlis Perbandaran Teluk Intan"
    },

    {
      n:"Bangunan Sultan Abdul Samad (Kuala Lumpur)",
      t:"1897",
      c:[3.1486,101.6945],
      i:"Bangunan ikonik ini menjadi simbol sejarah kemerdekaan Malaysia. Seni binanya menggabungkan gaya Moorish, Islam dan kolonial British.",
      src:"Jabatan Warisan Negara"
    },

    {
      n:"Istana Bandar Jugra (Selangor)",
      t:"1899",
      c:[2.8596,101.4428],
      i:"Istana ini direka sendiri oleh Sultan Alaeddin Sulaiman Shah dengan gabungan seni bina Moorish dan Melayu tradisional.",
      src:"PADAT Selangor"
    },

    {
      n:"Istana Seri Menanti (Negeri Sembilan)",
      t:"1902",
      c:[2.6974,102.1585],
      i:"Istana kayu tradisional Minangkabau ini dibina tanpa menggunakan sebatang paku besi dan menjadi lambang kehebatan pertukangan Melayu.",
      src:"Lembaga Muzium Negeri Sembilan"
    },

    {
      n:"Kota A Famosa (Melaka)",
      t:"1511",
      c:[2.1923,102.2497],
      i:"Kubu Portugis terkenal yang dibina selepas penaklukan Melaka. Porta de Santiago ialah satu-satunya bahagian yang masih kekal sehingga hari ini.",
      src:"PERZIM"
    },

    {
      n:"Istana Besar Johor",
      t:"1866",
      c:[1.4552,103.7554],
      i:"Istana ini dibina oleh Sultan Abu Bakar dan kini menjadi Muzium Diraja Johor yang menyimpan pelbagai khazanah diraja.",
      src:"Yayasan Warisan Johor"
    },

    {
      n:"Muzium Sungai Lembing (Pahang)",
      t:"1906",
      c:[3.9135,103.0335],
      i:"Kawasan perlombongan bawah tanah terbesar dunia suatu ketika dahulu dan dikenali sebagai El Dorado Timur.",
      src:"Jabatan Muzium Malaysia"
    },

    {
      n:"Masjid Abidin (Terengganu)",
      t:"1793",
      c:[5.3340,103.1423],
      i:"Masjid Putih ini merupakan antara masjid tertua di Terengganu dan mempunyai sejarah rapat dengan Kesultanan Terengganu.",
      src:"Lembaga Muzium Negeri Terengganu"
    },

    {
      n:"Istana Jahar (Kelantan)",
      t:"1887",
      c:[6.1322,102.2374],
      i:"Istana kayu tradisional ini kini dijadikan Muzium Adat Istiadat Diraja Kelantan.",
      src:"Perbadanan Muzium Negeri Kelantan"
    },

    // TEMPAT TAMBAHAN

    {
      n:"Fort Cornwallis (Pulau Pinang)",
      t:"1786",
      c:[5.4233,100.3390],
      i:"Kubu pertahanan terbesar yang dibina British di Malaysia. Dibina oleh Kapten Francis Light untuk melindungi Pulau Pinang daripada ancaman luar.",
      src:"Jabatan Warisan Negara"
    },

    {
      n:"Kellie's Castle (Perak)",
      t:"1915",
      c:[4.5740,101.0928],
      i:"Istana separuh siap milik William Kellie Smith yang terkenal dengan kisah misteri serta seni bina gabungan Scotland dan India.",
      src:"Tourism Perak"
    },

    {
      n:"Stadthuys (Melaka)",
      t:"1650",
      c:[2.1940,102.2495],
      i:"Bangunan merah peninggalan Belanda yang pernah menjadi pusat pentadbiran kolonial Belanda di Melaka.",
      src:"PERZIM"
    },

    {
      n:"Masjid Kampung Laut (Kelantan)",
      t:"1700-an",
      c:[6.1456,102.2330],
      i:"Antara masjid tertua di Malaysia dengan seni bina tradisional Melayu Nusantara tanpa penggunaan paku.",
      src:"Jabatan Warisan Negara"
    },

    {
      n:"Carcosa Seri Negara (Kuala Lumpur)",
      t:"1898",
      c:[3.1417,101.6892],
      i:"Kediaman rasmi Pesuruhjaya Tinggi British suatu ketika dahulu dan menjadi lokasi penting sejarah penjajahan British.",
      src:"Arkib Negara Malaysia"
    },

    {
      n:"Muzium Taiping (Perak)",
      t:"1883",
      c:[4.8519,100.7418],
      i:"Muzium pertama di Malaysia yang menyimpan koleksi sejarah, etnologi dan zoologi negara.",
      src:"Jabatan Muzium Malaysia"
    },

    {
      n:"Rumah Penghulu Abu Seman (Kuala Lumpur)",
      t:"1910",
      c:[3.1507,101.7067],
      i:"Rumah tradisional Melayu yang dipindahkan dari Kedah ke Kuala Lumpur untuk tujuan pemuliharaan warisan.",
      src:"Badan Warisan Malaysia"
    },

    {
      n:"Gereja Christ Church (Melaka)",
      t:"1753",
      c:[2.1942,102.2496],
      i:"Gereja Protestan tertua di Malaysia yang dibina semasa pemerintahan Belanda di Melaka.",
      src:"UNESCO Melaka"
    }

  ];

  var dialogText = document.getElementById("dialog-text");

  lokasiWarisan.forEach(function(l){

    var marker = L.marker(l.c).addTo(map);

    marker.on('click', function(){

      var metaverseLink =
      "https://www.google.com/maps?layer=c&cbll=" +
      l.c[0] + "," + l.c[1];

      dialogText.innerHTML = `
        <strong>> LOKASI:</strong> ${l.n}<br><br>

        <strong>> TAHUN:</strong> ${l.t}<br><br>

        ${l.i}

        <span class="source-text">
          SUMBER SISTEM: ${l.src}
        </span>

        <a href="${metaverseLink}"
           target="_blank"
           class="metaverse-btn">

           [ AKSES 360° ]
        </a>
      `;
    });

  });

</script>

</body>
</html>
