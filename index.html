<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menjejak Warisan Metaverse - NGGSIC 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #0c001f; /* Warna body Metaverse sangat gelap */
      color: #fff;
      padding: 40px; 
      margin: 0;
    }

    .header-title {
      text-align: center;
      margin-bottom: 5px;
      color: #00ffcc; /* Cyan Neon */
      text-shadow: 0 0 10px #00ffcc, 2px 2px #000;
      font-size: 28px;
    }
    
    .sub-title {
      text-align: center;
      margin-bottom: 40px;
      color: #f7d51d; /* Emas Neon */
      font-size: 11px;
      text-shadow: 1px 1px #000;
    }

    /* KOD BARU: Bekas Khas Peta berserta Bingkai */
    #map-wrapper {
      position: relative;
      width: 100%;
      height: 480px; /* Ketinggian sedikit lebih daripada peta untuk nampak frame di bawah */
      margin-bottom: 30px;
      padding: 10px; /* Ruang untuk frame */
      background: rgba(255,255,255,0.05); /* Sedikit glow di belakang peta */
      border: 3px solid #000;
    }

    #map {
      height: 100%;
      width: 100%;
      border: 3px solid #000;
      box-shadow: 0 0 15px #00ffcc; /* Efek 'glow' cyber pada peta */
      position: relative;
      z-index: 5;
    }

    /* KOD BARU: Tetapan untuk Frame NGGSIC menutupi Peta sahaja */
    .map-frame-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 99; /* Sentiasa di atas peta, tapi di bawah tajuk website */
      pointer-events: none; /* MEMBOLEHKAN klik peta 'tembus' melalui frame */
      mix-blend-mode: screen; /* Hilangkan warna hitam dari frame, biarkan glow sahaja */
      opacity: 0.9;
    }

    .dialog-box {
      background-color: white;
      color: black;
      margin-top: 20px;
      min-height: 160px;
    }
    
    #npc-avatar {
      width: 90px;
      height: 90px;
      image-rendering: pixelated;
      border: 3px solid black;
      background: #eee;
    }
    
    #dialog-text {
        font-size: 11px;
        line-height: 1.6;
    }

    #timeline-container {
        text-align: center;
        margin-top: 50px;
        padding-bottom: 80px;
    }
    
    #timeline-image {
        max-width: 90%;
        height: auto;
        border: 4px solid #fff;
    }

    .source-text {
      color: #209cee;
      font-size: 9px;
      display: block;
      margin-top: 10px;
      border-top: 1px dashed #ccc;
      padding-top: 5px;
    }

    #hidden-assets { display: none; }
    
    .metaverse-btn {
        margin-top: 15px;
        font-size: 10px !important;
        animation: blinker 1.5s linear infinite;
        display: inline-block;
    }
    
    @keyframes blinker {
      50% { opacity: 0.8; }
    }

    /* KOD BARU: Kelas Khas untuk Marker Hologram */
    .hologram-marker-img {
        mix-blend-mode: screen; /* INI KOD MAGIS TU: Latar belakang hitam marker hilang, glowing sahaja tinggal */
    }

  </style>
</head>
<body>

  <h2 class="header-title">MENJEJAK WARISAN</h2>
  <h3 class="sub-title">"WARISAN DIJEJAK, IDENTITI DIJAGA"</h3>

  <div class="nes-container is-rounded" id="map-wrapper">
    <div id="map"></div>
    <img src="frame.png.jpeg" class="map-frame-overlay" alt="Frame NGGSIC Overlay">
  </div>

  <section class="nes-container with-title dialog-box">
    <p class="title">Maklumat Lokasi Sejarah</p>
    <div style="display: flex; align-items: flex-start; gap: 20px;">
      <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="npc-avatar" alt="Avatar NPC">
      <div id="dialog-text">
        <p>Sistem Diaktifkan. Sila klik pada hologram neon 'Warisan Dijejak' di atas peta untuk memuat turun data rekod warisan berserta sumber rujukan.</p>
      </div>
    </div>
  </section>

  <div id="timeline-container">
    <h3 style="color: #f7d51d; margin-bottom: 25px;">PEREDARAN MASA</h3>
    <img src="timeline.png" id="timeline-image" alt="Carta Linimasa">
  </div>
  
  <div id="hidden-assets">
    <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="default-avatar">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([4.2105, 101.9758], 6);
    
    // Guna Peta Satelit Esri (Gaya Metaverse gelap)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri'
    }).addTo(map);

    // KOD BARU: Cipta Ikon Hologram Tersuai (Pastikan marker-meta.jpg ada di GitHub)
    var hologramIcon = L.icon({
      iconUrl: 'marker-meta.jpg', // Fail marker neon dari image_6.png
      iconSize: [40, 40], // Saiz ikon
      iconAnchor: [20, 40], // Titik sauh ikon (bahagian bawah tengah papan tanda)
      popupAnchor: [0, -40], // Titik sauh popup (bahagian atas tanda)
      className: 'hologram-marker-img' // Gunakan kelas CSS untuk mix-blend-mode
    });

    // Data Lokasi Lengkap dengan Nama Fail Baru
    var lokasiWarisan = [
      { n: "1. Muzium Kota Kayang (Perlis)", t: "1999", c: [6.4172, 100.1706], i: "Tapak kediaman keluarga bangsawan Raja Perlis, kemudian kediaman rasmi Penasihat British. Kini menyimpan artifak Galeri Senjata dan Galeri Diraja Perlis.", src: "Jabatan Muzium Malaysia (JMM)", img: "PERLIS.png" },
      { n: "2. Balai Besar (Kedah)", t: "1735", c: [6.1206, 100.3664], i: "Dibina oleh Sultan Muhammad Jiwa Jiwa Zainal Adilin II. Pusat acara rasmi diraja termasuk majlis pertabalan Sultan Kedah dari abad ke-18 hingga kini.", src: "Perbadanan Perpustakaan Awam Kedah / Pelancongan Negeri Kedah", img: "kedah.png" },
      { n: "3. Leong San Tong Khoo Kongsi (Pulau Pinang)", t: "1906", c: [5.4141, 100.3375], i: "Rumah kongsi keturunan Cina paling megah di Asia Tenggara. Pusat perpaduan keluarga Khoo dari wilayah Hokkien, China dengan seni bina ukiran naga gred tinggi.", src: "Penang Heritage Trust (PHT) & Portal Rasmi Khoo Kongsi", img: "penang.png" },
      { n: "4. Menara Condong Teluk Intan (Perak)", t: "1885", c: [4.0253, 101.0195], i: "Asalnya tangki air oleh arkitek Leong Choon Chong. Mula condong akibat struktur tanah berpaya dan beban air. Ikonik pagoda 8 tingkat.", src: "Majlis Perbandaran Teluk Intan (MPTI)", img: "PERAK.png" },
      { n: "5. Bangunan Sultan Abdul Samad (KL)", t: "1897", c: [3.1486, 101.6945], i: "Ikon Kuala Lumpur. Dibina berkonsepkan Moorish dan Moghul. Pusat pentadbiran kolonial British sebelum dijadikan Mahkamah Persekutuan.", src: "Jabatan Warisan Negara, Kementerian Pelancongan", img: "KL.png" },
      { n: "6. Istana Bandar Jugra (Selangor)", t: "1899", c: [2.8596, 101.4428], i: "Pusat pentadbiran diraja Selangor cetusan idea Sultan Alaeddin. Unik dengan gabungan seni bina Islam-Moorish.", src: "Perbadanan Adat Melayu dan Warisan Negeri Selangor (PADAT)", img: "Selangor.png" },
      { n: "7. Muzium Diraja Istana Seri Menanti (N. Sembilan)", t: "1902", c: [2.6974, 102.1585], i: "Dibina tanpa paku besi (hanya pasak kayu) oleh Tukang Kahar and Tukang Taib. Keunikan 99 batang tiang kayu cengal.", src: "Lembaga Muzium Negeri Sembilan (LMNS)", img: "N. 9.png" },
      { n: "8. Kota A Famosa (Melaka)", t: "1511", c: [2.1923, 102.2497], i: "Kubu Portugis Alfonso de Albuquerque. Kediaman rasmi Gabenor Belanda. Bangunan kolonial Belanda tertua wujud di Asia Tenggara.", src: "Perbadanan Muzium Melaka (PERZIM)", img: "melaka.png" },
      { n: "9. Istana Besar Johor (Johor)", t: "1866", c: [1.4552, 103.7554], i: "Kediaman rasmi Sultan Abu Bakar. Konsep Anglo-Melayu menghadap Selat Tebrau. Kini Muzium Diraja Abu Bakar.", src: "Yayasan Warisan Johor (YWJ)", img: "Johor.png" },
      { n: "10. Muzium Sungai Lembing (Pahang)", t: "1906", c: [3.9135, 103.0335], i: "Lombong bijih timah bawah tanah terdalam dan terbesar di dunia. Bekas kediaman pengurus syarikat perlombongan British.", src: "Majlis Bandaraya Kuantan & Jabatan Muzium Malaysia", img: "pahang.png" },
      { n: "11. Masjid Abidin (Terengganu)", t: "1793", c: [5.3340, 103.1423], i: "Masjid diraja utama Terengganu yang dikenali sebagai Masjid Putih. Diiktiraf sebagai masjid tertua di negeri.", src: "Lembaga Muzium Negeri Terengganu", img: "TERENGGANU.png" },
      { n: "12. Istana Jahar (Kelantan)", t: "1887", c: [6.1322, 102.2374], i: "Dibina oleh Sultan Muhamad II sebagai anugerah untuk cucunda baginda. Seni ukir kehalusan tukang kayu Kelantan.", src: "Perbadanan Muzium Negeri Kelantan", img: "Kelantan.png" }
    ];

    var dialogText = document.getElementById("dialog-text");
    var npcAvatar = document.getElementById("npc-avatar");
    var defaultImg = document.getElementById("default-avatar").src;

    lokasiWarisan.forEach(function(l) {
      // Gunakan hologramIcon menggantikan pin biru biasa
      var marker = L.marker(l.c, {icon: hologramIcon}).addTo(map);
      marker.on('click', function() {
        
        var metaverseLink = "https://www.google.com/maps?layer=c&cbll=" + l.c[0] + "," + l.c[1];
        
        dialogText.innerHTML = `
          <strong>${l.n} (Tahun: ${l.t})</strong><br><br>
          ${l.i}
          <span class="source-text"><strong>Sumber Rujukan Rasmi:</strong> ${l.src}</span>
          <a href='${metaverseLink}' target='_blank' class='nes-btn is-success metaverse-btn'>MASUK METAVERSE 360°</a>
        `;
        
        if (l.img !== "") {
          npcAvatar.src = l.img;
        } else {
          npcAvatar.src = defaultImg;
        }
      });
    });
  </script>

</body>
</html>
