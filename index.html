<style>

body{
    margin:0;
    padding:30px;
    background:#050505;
    background-image:

    color:white;
}

/* TAJUK */

.header-title{
    text-align:center;
    font-size:28px;
    margin-bottom:10px;

    text-shadow:
    0 0 5px #fff,
    0 0 10px #ff00de,
    0 0 20px #ff00de,
    0 0 40px #ff00de;
}

.sub-title{
    text-align:center;
    font-size:10px;
    margin-bottom:40px;
    color:#e0ffff;

    text-shadow:
    0 0 5px #00ffff,
    0 0 10px #00ffff;
}

/* MAP */

.map-container{
    padding:5px;
    border:3px solid #00ffff;
    border-radius:10px;

    box-shadow:
    0 0 15px #00ffff,
    inset 0 0 15px #00ffff;

    background:black;
    margin-bottom:30px;
}

#map{
    width:100%;
    height:600px;
    border-radius:5px;
}

/* DIALOG BOX */

.dialog-box{
    background:rgba(0,0,0,0.85);

    border:3px solid #39ff14;
    border-radius:10px;

    padding:25px;

    box-shadow:
    0 0 15px #39ff14,
    inset 0 0 10px #39ff14;
}

.dialog-title{
    color:#39ff14;
    font-size:14px;

    margin-top:0;
    margin-bottom:20px;

    border-bottom:1px dashed #39ff14;
    padding-bottom:10px;

    text-shadow:
    0 0 5px #39ff14;
}

#dialog-text{
    font-size:11px;
    line-height:1.9;
    color:#e0ffff;
}

.source-text{
    display:block;

    margin-top:15px;
    padding-top:10px;

    border-top:1px dashed #666;

    color:#ffaa00;
    font-size:9px;
}

/* BUTTON */

.metaverse-btn{
    display:inline-block;

    margin-top:20px;
    padding:12px 18px;

    text-decoration:none;
    color:#ff00de;

    border:2px solid #ff00de;

    box-shadow:
    0 0 10px #ff00de,
    inset 0 0 5px #ff00de;

    transition:0.3s;

    font-size:10px;
}

.metaverse-btn:hover{
    background:#ff00de;
    color:white;

    box-shadow:
    0 0 20px #ff00de;
}

/* RESPONSIVE */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .header-title{
        font-size:18px;
    }

    .sub-title{
        font-size:8px;
    }

    #dialog-text{
        font-size:9px;
    }

}

</style>
</head>
