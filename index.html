<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jejak Warisan Digital Malaysia - NGGSIC 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #212529;
      color: #fff;
      padding: 80px 50px; /* Ruang supaya tidak kena bingkai */
      margin: 0;
    }
    
    /* Bingkai NGGSIC - Tetapan Kekal di Atas */
    .poster-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      pointer-events: none; /* Supaya boleh klik peta di belakang bingkai */
    }

    .header-title {
      text-align: center;
      margin-bottom: 30px;
      color: #f7d51d;
      text-shadow: 2px 2px #000;
    }

    #map-container {
      background-color: white;
      padding: 10px;
      margin-bottom: 20px;
      border: 4px solid #000;
    }

    #map {
      height: 400px;
      width: 100%;
    }

    .dialog-box {
      background-color: white;
      color: black;
      margin-top: 20px;
      min-height: 150px;
    }
    
    #npc-avatar {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      border: 3px solid black;
      background: #eee;
    }

    #timeline-container {
      text-align: center;
      margin-top: 40px;
      padding-bottom: 100px;
    }
    
    #timeline-image {
      max-width: 90%;
      border: 5px solid #fff;
    }

    /* Sembunyikan elemen teknikal */
    #hidden-assets { display: none; }
  </style>
</head>
<body>

  <img src="frame.png.jpeg" class="poster-frame" alt="Frame NGGSIC">

  <h2 class="header-title">JEJAK WARISAN MALAYSIA</h2>

  <div class="nes-container is-rounded" id="map-container">
    <div id="map"></div>
  </div>

  <section class="nes-container with-title dialog-box">
    <p class="title">Pemandu Sejarah</p>
    <div style="display: flex; align-items: center; gap: 20px;">
      <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="npc-avatar" alt="Avatar">
      <p id="dialog-text">Selamat datang! Sila klik pin pada peta untuk melihat sejarah mengikut linimasa warisan kita.</p>
    </div>
  </section>

  <div id="timeline-container">
    <h3 style="color: #f7d51d; margin-bottom: 20px;">RUJUKAN LINIMASA</h3>
    <img src="cart.jpeg" id="timeline-image" alt="Carta Linimasa">
  </div>

  <div id="hidden-assets">
    <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="default-avatar">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Inisialisasi Peta
    var map = L.map('map').setView([4.2105, 101.9758], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Data 12 Lokasi (Kombinasi Jadual & Linimasa)
    var lokasiWarisan = [
      { n: "Kota A Famosa (Melaka)", t: "1511", c: [2.1923, 102.2497], i: "Kubu Portugis yang ikonik di Melaka.", img: "" },
      { n: "Balai Besar (Kedah)", t: "1735", c: [6.1206, 100.3664], i: "Tempat pertabalan dan majlis rasmi diraja Kedah.", img: "kedah.png" },
      { n: "Istana Besar Johor (Johor)", t: "1866", c: [1.4552, 103.7554], i: "Kediaman rasmi Sultan Abu Bakar, Bapa Pemodenan Johor.", img: "Johor.png" },
      { n: "Masjid Abidin (Terengganu)", t: "1793", c: [5.3340, 103.1423], i: "Dikenali sebagai Masjid Putih, masjid diraja tertua di Terengganu.", img: "Terengganu.png" },
      { n: "Menara Condong Teluk Intan (Perak)", t: "1885", c: [4.0253, 101.0195], i: "Asalnya tangki air, kini mercu tanda unik di Perak.", img: "" },
      { n: "Istana Jahar (Kelantan)", t: "1887", c: [6.1322, 102.2374], i: "Muzium Adat Istiadat Diraja yang sangat indah seni binanya.", img: "Kelantan.png" },
      { n: "Bangunan Sultan Abdul Samad (KL)", t: "1897", c: [3.1486, 101.6945], i: "Pusat pentadbiran British yang kini menjadi simbol kemerdekaan.", img: "KL.png" },
      { n: "Istana Bandar Jugra (Selangor)", t: "1899", c: [2.8596, 101.4428], i: "Pusat pemerintahan Selangor di daerah Kuala Langat suatu masa dahulu.", img: "Selangor.png" },
      { n: "Istana Seri Menanti (N. Sembilan)", t: "1902", c: [2.6974, 102.1585], i: "Istana kayu tanpa paku yang melambangkan kehebatan seni bina tempatan.", img: "N. 9.png" },
      { n: "Khoo Kongsi (Pulau Pinang)", t: "1906", c: [5.4141, 100.3375], i: "Rumah persatuan keluarga yang paling gah di George Town.", img: "penang.png" },
      { n: "Muzium Sungai Lembing (Pahang)", t: "1906", c: [3.9135, 103.0335], i: "Pusat perlombongan bijih timah bawah tanah terdalam di dunia.", img: "" },
      { n: "Muzium Kota Kayang (Perlis)", t: "1999", c: [6.4172, 100.1706], i: "Tapak sejarah purba yang menyimpan khazanah kerajaan Perlis.", img: "" }
    ];

    var dialogText = document.getElementById("dialog-text");
    var npcAvatar = document.getElementById("npc-avatar");
    var defaultImg = document.getElementById("default-avatar").src;

    // 3. Letakkan Pin & Logik Klik
    lokasiWarisan.forEach(function(l) {
      var marker = L.marker(l.c).addTo(map);
      marker.on('click', function() {
        // Tukar Teks
        dialogText.innerHTML = "<strong>" + l.n + " (" + l.t + ")</strong><br><br>" + l.i;
        
        // Tukar Gambar Avatar (Jika ada fail .png negeri)
        if (l.img !== "") {
          npcAvatar.src = l.img;
        } else {
          npcAvatar.src = defaultImg;
        }
      });
    });
  </script>

</body>
</html>
