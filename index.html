<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">

<title>MENJEJAK WARISAN - METAVERSE HUB</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    padding:30px;
    background:#050505;
    background-image: radial-gradient(circle,#1a1a2e 0%,#050505 80%);
    
    /* MENGGUNAKAN FONT LORA UNTUK KESELURUHAN WEB SUPAYA TEKS JELAS */
    font-family: 'Lora', serif;
    color:white;
}

/* TAJUK (MENGGUNAKAN FONT CINZEL UNTUK MATERIAL WARISAN YANG GAH) */
.header-title{
    font-family: 'Cinzel', serif;
    text-align:center;
    font-size:36px;
    margin-bottom:10px;
    letter-spacing: 3px;
    text-shadow:
    0 0 5px #fff,
    0 0 10px #ff00de,
    0 0 20px #ff00de,
    0 0 40px #ff00de;
}

.sub-title{
    font-family: 'Cinzel', serif;
    text-align:center;
    font-size:13px;
    margin-bottom:40px;
    color:#e0ffff;
    letter-spacing: 2px;
    text-shadow:
    0 0 5px #00ffff,
    0 0 10px #00ffff;
}

/* MAP */
.map-container{
    padding:5px;
    border:3px solid #00ffff;
    border-radius:10px;
    box-shadow:
    0 0 15px #00ffff,
    inset 0 0 15px #00ffff;
    background:black;
    margin-bottom:30px;
}

#map{
    width:100%;
    height:600px;
    border-radius:5px;
}

/* DIALOG BOX */
.dialog-box{
    background:rgba(0,0,0,0.85);
    border:3px solid #39ff14;
    border-radius:10px;
    padding:25px;
    box-shadow:
    0 0 15px #39ff14,
    inset 0 0 10px #39ff14;
}

.dialog-title{
    font-family: 'Cinzel', serif;
    color:#39ff14;
    font-size:18px;
    margin-top:0;
    margin-bottom:20px;
    border-bottom:1px dashed #39ff14;
    padding-bottom:10px;
    letter-spacing: 1px;
    text-shadow:
    0 0 5px #39ff14;
}

#dialog-text{
    font-size:15px; /* Ditukar dari 11px ke 15px supaya sangat selesa dibaca */
    line-height:1.9;
    color:#e0ffff;
}

.source-text{
    display:block;
    margin-top:15px;
    padding-top:10px;
    border-top:1px dashed #666;
    color:#ffaa00;
    font-size:12px;
}

/* BUTTON */
.metaverse-btn{
    font-family: 'Cinzel', serif;
    display:inline-block;
    margin-top:20px;
    padding:12px 22px;
    text-decoration:none;
    color:#ff00de;
    border:2px solid #ff00de;
    box-shadow:
    0 0 10px #ff00de,
    inset 0 0 5px #ff00de;
    transition:0.3s;
    font-size:13px;
    font-weight: bold;
    letter-spacing: 1px;
}

.metaverse-btn:hover{
    background:#ff00de;
    color:white;
    box-shadow:
    0 0 20px #ff00de;
}

/* RESPONSIVE */
@media(max-width:768px){
    body{
        padding:15px;
    }
    .header-title{
        font-size:24px;
    }
    .sub-title{
        font-size:10px;
    }
    #dialog-text{
        font-size:13px;
    }
}
</style>
</head>

<body>

<h1 class="header-title">MENJEJAK WARISAN</h1>
<h3 class="sub-title">" WARISAN DIJEJAK, IDENTITI DIJAGA " // METAVERSE HUB</h3>

<div class="map-container">
    <div id="map"></div>
</div>

<section class="dialog-box">
    <h3 class="dialog-title">TERMINAL DATA SEJARAH</h3>
    <div id="dialog-text">
        Sistem sedia...<br><br>
        Klik mana-mana pin lokasi pada peta untuk mengakses arkib sejarah digital yang disokong dengan visual 360°.
    </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* PAPARAN PETA */
var map = L.map('map').setView([4.2105,101.9758],6);

/* DARK MODE MAP */
L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap & CartoDB'
}
).addTo(map);

/* DATA TEMPAT BERSEJARAH */
var lokasiWarisan = [

},

{

{

},

{
n:"Kellie's Castle (Perak)",

src:"Tourism Perak"
},

{
n:"Masjid Ubudiah (Perak)",
t:"1917",

},

{
n:"Khoo Kongsi (Pulau Pinang)",
t:"1906",
c:[5.414343, 100.337582],

src:"Penang Heritage Trust"
},

{
n:"Fort Cornwallis (Pulau Pinang)",

{

},

{

t:"1819",
c:[6.339250, 99.784111],
i:"Tapak peristirahatan terakhir seorang wanita suci bernama Mahsuri yang dijatuhkan hukuman bunuh akibat fitnah murtad dan curang. Sebelum menghembuskan nafas terakhir, beliau bersumpah Langkawi akan menjadi padang jarak padang tekukur selama tujuh keturunan.",

},

{

{

},

{

},

{

{

{
n:"The Old Courthouse (Sarawak)",
t:"1874",
c:[1.558778, 110.344158],
i:"Dibina semasa era pemerintahan Rajah Charles Brooke. Struktur kompleks bangunan ini dibina daripada dinding batu konkrit tebal beratap genting dengan reka bentuk tiang ala Roman untuk dijadikan pusat kehakiman dan pentadbiran.",
src:"Sarawak Heritage Society"
},

{
n:"Muzium Budaya Borneo (Sarawak)",
t:"2022",
c:[1.555472, 110.342861],
i:"Walaupun bangunannya baharu, ia memelihara warisan ribuan tahun. Muzium kedua terbesar di Asia Tenggara ini memaparkan reka bentuk bumbung keemasan berilhamkan seni anyaman tradisional Sarawak.",
src:"Sarawak Museum Department"
}

];

/* DIALOG */
var dialogText = document.getElementById("dialog-text");

/* LOOP MARKER */
lokasiWarisan.forEach(function(l){
    var marker = L.marker(l.c).addTo(map);

    marker.on('click',function(){
        
        /* PEMBETULAN: Menggunakan sintaks template literal ${l.c[0]} yang betul & pautan URL Google Maps rasmi yang stabil */
        var metaverseLink = `https://www.google.com/maps?q=&layer=c&cbll=${l.c[0]},${l.c[1]}`;

        dialogText.innerHTML = `
        <strong>> LOKASI:</strong>
        ${l.n}
        <br><br>

        <strong>> TAHUN:</strong>
        ${l.t}
        <br><br>

        <strong>> SEJARAH & INFO:</strong><br>
        ${l.i}

        <span class="source-text">
        SUMBER SISTEM:
        ${l.src}
        </span>

        <a href="${metaverseLink}"
        target="_blank"
        class="metaverse-btn">
        [ AKSES 360° ]
        </a>
        `;
    });
});

</script>

</body>
</html>
