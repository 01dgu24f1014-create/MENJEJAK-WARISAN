<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jejak Warisan Digital Malaysia - NGGSIC 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #212529;
      color: #fff;
      padding: 80px 50px; 
      margin: 0;
    }
    
    /* Bingkai NGGSIC */
    .poster-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      pointer-events: none; 
      mix-blend-mode: multiply;
    }

    .header-title {
      text-align: center;
      margin-bottom: 30px;
      color: #f7d51d;
      text-shadow: 2px 2px #000;
    }

    #map-container {
      background-color: white;
      padding: 10px;
      margin-bottom: 20px;
      border: 4px solid #000;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 20px #00ffcc;
    }

    #map {
      height: 400px;
      width: 100%;
    }

    .dialog-box {
      background-color: white;
      color: black;
      margin-top: 20px;
      min-height: 150px;
      position: relative;
      z-index: 10;
    }
    
    #npc-avatar {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      border: 3px solid black;
      background: #eee;
    }

    #timeline-container {
      text-align: center;
      margin-top: 40px;
      padding-bottom: 100px;
      position: relative;
      z-index: 10;
    }
    
    #timeline-image {
      max-width: 90%;
      border: 5px solid #fff;
    }

    #hidden-assets { display: none; }
    
    /* Butang Metaverse */
    .metaverse-btn {
        margin-top: 15px;
        font-size: 10px !important;
        animation: blinker 1.5s linear infinite;
    }
    
    @keyframes blinker {
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>

  <img src="frame.png.jpeg" class="poster-frame" alt="Frame NGGSIC">

  <h2 class="header-title">JEJAK WARISAN MALAYSIA</h2>

  <div class="nes-container is-rounded" id="map-container">
    <div id="map"></div>
  </div>

  <section class="nes-container with-title dialog-box">
    <p class="title">Pemandu Sejarah</p>
    <div style="display: flex; align-items: center; gap: 20px;">
      <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="npc-avatar" alt="Avatar">
      <div id="dialog-text">
        <p>Selamat datang! Sila klik pin pada peta untuk melihat sejarah mengikut linimasa warisan kita.</p>
      </div>
    </div>
  </section>

  <div id="timeline-container">
    <h3 style="color: #f7d51d; margin-bottom: 20px;">RUJUKAN LINIMASA</h3>
    <img src="cart.jpeg" id="timeline-image" alt="Carta Linimasa">
  </div>

  <div id="hidden-assets">
    <img src="https://unpkg.com/nes.css/assets/bc-rikka-bird.png" id="default-avatar">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([4.2105, 101.9758], 5); // Zum diturunkan sikit ke tahap 5 untuk nampak Sabah/Sarawak
    
    // Peta Satelit Esri (Gaya Metaverse)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri'
    }).addTo(map);

    // Data Lokasi Lengkap
    var lokasiWarisan = [
      { n: "Kota A Famosa (Melaka)", t: "1511", c: [2.1923, 102.2497], i: "Kubu Portugis. Stadthuys sebagai kediaman Gabenor Belanda.", img: "" },
      { n: "Balai Besar (Kedah)", t: "1735", c: [6.1206, 100.3664], i: "Dibina untuk majlis diraja seperti pertabalan sultan.", img: "kedah.png" },
      { n: "Istana Besar Johor (Johor)", t: "1866", c: [1.4552, 103.7554], i: "Dibina oleh Sultan Abu Bakar sebagai kediaman rasmi.", img: "Johor.png" },
      { n: "Masjid Abidin (Terengganu)", t: "1793", c: [5.3340, 103.1423], i: "Masjid diraja utama Terengganu yang dikenali sebagai Masjid Putih.", img: "Terengganu.png" },
      { n: "Menara Condong Teluk Intan (Perak)", t: "1885", c: [4.0253, 101.0195], i: "Asalnya tangki simpanan air untuk kegunaan harian dan kecemasan.", img: "" },
      { n: "Istana Jahar (Kelantan)", t: "1887", c: [6.1322, 102.2374], i: "Anugerah Sultan Muhamad II kepada cucunda baginda.", img: "Kelantan.png" },
      { n: "Bangunan Sultan Abdul Samad (KL)", t: "1897", c: [3.1486, 101.6945], i: "Menempatkan pejabat-pejabat urusan pentadbiran kolonial British.", img: "KL.png" },
      { n: "Istana Bandar Jugra (Selangor)", t: "1899", c: [2.8596, 101.4428], i: "Pusat pentadbiran diraja Selangor cetusan idea Sultan Sir Alaeddin.", img: "Selangor.png" },
      { n: "Istana Seri Menanti (N. Sembilan)", t: "1902", c: [2.6974, 102.1585], i: "Dibina untuk menggantikan istana lama yang terbakar.", img: "N. 9.png" },
      { n: "Khoo Kongsi (Pulau Pinang)", t: "1906", c: [5.4141, 100.3375], i: "Rumah persatuan (clanhouse) untuk menyatukan ahli keluarga.", img: "penang.png" },
      { n: "Muzium Sungai Lembing (Pahang)", t: "1906", c: [3.9135, 103.0335], i: "Pusat perlombongan bijih timah bawah tanah terdalam.", img: "" },
      { n: "Muzium Kota Kayang (Perlis)", t: "1999", c: [6.4172, 100.1706], i: "Tapak kediaman keluarga bangsawan dan kerabat diraja.", img: "" },
      { n: "Tugu Peringatan Perang Kundasang (Sabah)", t: "1962", c: [5.9846, 116.5772], i: "Memperingati tawanan perang yang maut dalam Kawat Maut Sandakan.", img: "" },
      { n: "Kubu Margherita (Sarawak)", t: "1879", c: [1.5606, 110.3467], i: "Dibina oleh Rajah Putih Charles Brooke untuk melindungi bandar Kuching.", img: "" }
    ];

    var dialogText = document.getElementById("dialog-text");
    var npcAvatar = document.getElementById("npc-avatar");
    var defaultImg = document.getElementById("default-avatar").src;

    lokasiWarisan.forEach(function(l) {
      var marker = L.marker(l.c).addTo(map);
      marker.on('click', function() {
        
        // KOD BARU: Terus pautkan koordinat ke Google Street View 360
        var metaverseLink = "https://www.google.com/maps?layer=c&cbll=" + l.c[0] + "," + l.c[1];
        
        dialogText.innerHTML = "<strong>" + l.n + " (" + l.t + ")</strong><br><br>" + l.i + 
        "<br><a href='" + metaverseLink + "' target='_blank' class='nes-btn is-success metaverse-btn'>MASUK METAVERSE 360°</a>";
        
        if (l.img !== "") {
          npcAvatar.src = l.img;
        } else {
          npcAvatar.src = defaultImg;
        }
      });
    });
  </script>

</body>
</html>
